name: workflow-plugin CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: ruff check
        run: uvx ruff check workflow-plugin
      - name: ruff format --check
        run: uvx ruff format --check workflow-plugin

  ty:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow-plugin
        uses: actions/checkout@v4
        with:
          path: workflow-plugin

      - name: Checkout sibling artifact-plugin
        uses: actions/checkout@v4
        with:
          repository: cjhowe-us/artifact-plugin
          path: artifact-plugin

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: workflow-plugin/workflow-plugin/pyproject.toml

      - name: Install workflow-plugin + dev deps into a venv
        working-directory: workflow-plugin/workflow-plugin
        run: |
          uv venv .venv --python 3.12
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: ty check
        working-directory: workflow-plugin/workflow-plugin
        run: uvx ty check --python .venv/bin/python

  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout workflow-plugin
        uses: actions/checkout@v4
        with:
          path: workflow-plugin

      # Sibling checkout — workflow-plugin/tests/conftest.py and pyproject.toml's
      # pythonpath both expect ../artifact-plugin/artifact-plugin/scripts to
      # exist so the `artifactlib` import resolves without publishing
      # artifact-plugin to PyPI.
      - name: Checkout sibling artifact-plugin
        uses: actions/checkout@v4
        with:
          repository: cjhowe-us/artifact-plugin
          path: artifact-plugin

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: workflow-plugin/workflow-plugin/pyproject.toml

      - name: Install workflow-plugin + dev deps
        working-directory: workflow-plugin/workflow-plugin
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        working-directory: workflow-plugin/workflow-plugin
        run: python -m pytest -v
