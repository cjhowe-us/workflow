# GitHub Actions workflow — auto-add every PR opened in this repo to the
# coordinator Project v2 so the orchestrator sees it on its next dispatch
# pass.
#
# Copy this file to `.github/workflows/add-prs-to-project.yml` in the target
# repo, replace `PROJECT_URL` with your Project's URL, and create a
# repository secret named `ADD_TO_PROJECT_PAT`:
#
#   - Create a user-scope PAT at https://github.com/settings/tokens?type=beta
#     with scopes: `project`, `read:project`, `repo` (for private repos).
#   - Store it as a repo secret: Settings → Secrets and variables → Actions →
#     New repository secret, name `ADD_TO_PROJECT_PAT`, value <the token>.
#
# The default `GITHUB_TOKEN` cannot add items to user-owned Project v2; the
# PAT is required. Organization-owned projects can use a GitHub App token.
#
# Alternative (no Actions workflow required): enable the Project's built-in
# "Auto-add to project" workflow in the Project's settings and set the filter
# to `is:pr is:open`. That's UI-only config and works for every repo linked
# to the Project. Use the Actions workflow when you need per-repo control or
# additional conditions.

name: Add PRs to coordinator project

on:
  pull_request:
    types: [opened, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read
  pull-requests: read

jobs:
  add-to-project:
    name: Add PR to project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          # Example: https://github.com/users/cjhowe-us/projects/2
          #          https://github.com/orgs/your-org/projects/42
          project-url: PROJECT_URL_GOES_HERE
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
